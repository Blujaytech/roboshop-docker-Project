services:
  mongodb:
    build: ./mongodb
    image: mongodb:1.0
    container_name: mongodb
    volumes:
      - mongodb:/data/db

  redis:
    image: redis:7.0
    container_name: redis
    volumes:
      - redis:/data

  mysql:
    build: ./mysql
    image: mysql:1.0
    container_name: mysql
    volumes:
      - mysql:/var/lib/mysql

  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    volumes:
      - rabbitmq:/var/lib/rabbitmq

  catalogue:
    build: ./catalogue
    image: catalogue:1.0
    container_name: catalogue
    depends_on:
      - mongodb

  user:
    build: ./user
    image: user:1.0
    container_name: user
    environment:
      MONGO: "true"
      REDIS_HOST: "redis"
      MONGO_URL: "mongodb://mongodb:27017/users"
    depends_on:
      - mongodb
      - redis

  cart:
    build: ./cart
    image: cart:1.0
    container_name: cart
    environment:
      REDIS_HOST: "redis"
      CATALOGUE_HOST: "catalogue"
      CATALOGUE_PORT: "8080"
    depends_on:
      - redis
      - catalogue

  shipping:
    build: ./shipping
    image: shipping:1.0
    container_name: shipping
    depends_on:
      - mysql
      - cart

  payment:
    build: ./payment
    image: payment:1.0
    container_name: payment
    environment:
      CART_HOST: "cart"
      CART_PORT: "8080"
      USER_HOST: "user"
      USER_PORT: "8080"
      AMQP_HOST: "rabbitmq"
      AMQP_USER: "roboshop"
      AMQP_PASS: "roboshop123"
    depends_on:
      - rabbitmq
      - cart
      - user

  frontend:
    build: ./frontend
    image: frontend:1.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart
      - shipping
      - payment

networks:
  default:
    name: roboshop
    driver: bridge

volumes:
  mongodb:
  redis:
  mysql:
  rabbitmq:
